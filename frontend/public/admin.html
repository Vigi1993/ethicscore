<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthicPrint — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #e8e8f0;
    --muted: rgba(255,255,255,0.3);
    --accent: #63CAB7;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #facc15;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap: 24px; height: 56px;
  }
  header h1 { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .tabs { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; color: var(--muted); background: transparent; }
  .tab.active { background: rgba(99,202,183,0.1); border-color: rgba(99,202,183,0.25); color: var(--accent); }
  .tab:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text); }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; border-radius: 99px; font-size: 10px; font-weight: 600; padding: 0 5px; margin-left: 6px; }
  .badge-pending { background: rgba(250,204,21,0.15); color: var(--yellow); }
  .badge-count   { background: rgba(255,255,255,0.08); color: var(--muted); }

  .main { max-width: 1000px; margin: 0 auto; padding: 32px 24px 80px; }

  .stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 32px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .stat-val   { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
  .filter-bar span { font-size: 11px; color: var(--muted); margin-right: 4px; }
  .filter-chip { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .filter-chip.active { background: rgba(99,202,183,0.1); border-color: rgba(99,202,183,0.25); color: var(--accent); }

  .brand-group  { margin-bottom: 24px; }
  .brand-header { display: flex; align-items: center; gap: 10px; padding: 12px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .brand-logo   { width: 28px; height: 28px; border-radius: 7px; background: rgba(99,202,183,0.1); border: 1px solid rgba(99,202,183,0.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .brand-name   { font-size: 14px; font-weight: 600; }
  .brand-count  { font-size: 11px; color: var(--muted); }

  .proposal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 8px; display: flex; gap: 16px; align-items: flex-start; transition: border-color 0.2s; }
  .proposal-card:hover { border-color: rgba(255,255,255,0.1); }
  .proposal-card.approved { border-color: rgba(74,222,128,0.2); background: rgba(74,222,128,0.03); }
  .proposal-card.rejected { border-color: rgba(248,113,113,0.15); background: rgba(248,113,113,0.02); opacity: 0.6; }

  .cat-badge    { padding: 3px 9px; border-radius: 99px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; flex-shrink: 0; margin-top: 2px; }
  .cat-armi     { background: rgba(248,113,113,0.12); color: #f87171; }
  .cat-ambiente { background: rgba(74,222,128,0.12);  color: #4ade80; }
  .cat-diritti  { background: rgba(99,202,183,0.12);  color: #63CAB7; }
  .cat-fisco    { background: rgba(250,204,21,0.12);  color: #facc15; }

  .proposal-body    { flex: 1; min-width: 0; }
  .proposal-title   { font-size: 13px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proposal-pub     { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .proposal-summary { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; margin-bottom: 8px; }
  .proposal-url     { font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(99,202,183,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .proposal-url:hover { color: var(--accent); }
  .proposal-meta    { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .ai-block        { margin: 10px 0 4px; padding: 10px 14px; background: rgba(99,202,183,0.04); border: 1px solid rgba(99,202,183,0.15); border-radius: 8px; }
  .ai-block-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .ai-label        { font-size: 11px; color: #63CAB7; font-weight: 600; letter-spacing: .05em; }
  .ai-tier-badge   { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .tier-1 { background: rgba(240,192,96,0.15);  color: #f0c060; }
  .tier-2 { background: rgba(160,180,200,0.15); color: #a0b4c8; }
  .tier-3 { background: rgba(192,128,96,0.15);  color: #c08060; }

  .proposal-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-approve { background: rgba(74,222,128,0.1);   border-color: rgba(74,222,128,0.25);  color: var(--green); }
  .btn-approve:hover { background: rgba(74,222,128,0.2); }
  .btn-reject  { background: rgba(248,113,113,0.07); border-color: rgba(248,113,113,0.15); color: var(--red); }
  .btn-reject:hover  { background: rgba(248,113,113,0.15); }
  .btn-revert  { background: rgba(250,204,21,0.07);  border-color: rgba(250,204,21,0.2);   color: var(--yellow); font-size: 11px; }
  .btn-revert:hover  { background: rgba(250,204,21,0.15); }
  .btn-open    { background: transparent; border-color: var(--border); color: var(--muted); font-size: 11px; padding: 5px 10px; }
  .btn-open:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-chip     { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .status-approved { background: rgba(74,222,128,0.1);  color: var(--green); }
  .status-rejected { background: rgba(248,113,113,0.1); color: var(--red); }
  .job-badge       { font-size: 9px; padding: 2px 7px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.5px; }
  .job-new         { background: rgba(99,202,183,0.1);  color: var(--accent); }
  .job-replacement { background: rgba(251,146,60,0.12); color: var(--orange); }

  .empty      { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .loading    { text-align: center; padding: 80px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 2px; }
  .toast      { position: fixed; bottom: 24px; right: 24px; background: #1a1a28; border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; z-index: 999; transition: opacity 0.3s; }
  .toast.hide { opacity: 0; pointer-events: none; }

  /* ── SCORE V2 ── */
  .v2-grid    { display: grid; grid-template-columns: 220px 1fr; gap: 20px; align-items: start; }
  .v2-sidebar { position: sticky; top: 72px; }
  .v2-score-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .v2-total       { font-size: 34px; font-weight: 700; font-family: 'DM Mono', monospace; text-align: center; line-height: 1; }
  .v2-total-label { font-size: 10px; color: var(--muted); text-align: center; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  .v2-cat-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .v2-cat-btn  { flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 10px; transition: all .15s; text-align: center; }
  .v2-cat-btn.active { background: rgba(99,202,183,0.1); border-color: rgba(99,202,183,0.25); color: var(--accent); }

  .cat-score-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cat-score-label  { font-size: 13px; font-weight: 600; }
  .cat-score-val    { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; padding: 3px 10px; border-radius: 8px; }

  .criterion-card  { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
  .criterion-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .criterion-code  { font-size: 10px; color: rgba(255,255,255,0.3); font-family: 'DM Mono', monospace; letter-spacing: 0.5px; margin-bottom: 14px; }

  .form-row   { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 10px; align-items: end; }
  .form-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  select.v2-select { width: 100%; background: #0f1a14; border: 1px solid rgba(255,255,255,0.1); color: #f0f0f0; padding: 8px 10px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; }

  .judgment-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
  .judgment-btn  { padding: 8px 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: transparent; cursor: pointer; font-size: 10px; font-family: 'DM Sans', sans-serif; transition: all .15s; line-height: 1.3; text-align: center; }

  .save-row      { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .value-preview { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.3); }

  .assigned-source { display: flex; align-items: center; gap: 10px; background: rgba(74,222,128,0.05); border: 1px solid rgba(74,222,128,0.15); border-radius: 8px; padding: 10px 12px; margin-top: 10px; }
  .assigned-info   { flex: 1; min-width: 0; }
  .assigned-title  { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .assigned-meta   { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .assigned-score  { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; }
  .btn-unassign    { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--red); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: 'DM Sans', sans-serif; flex-shrink: 0; transition: all .15s; white-space: nowrap; }
  .btn-unassign:hover { background: rgba(248,113,113,0.18); }

  .sidebar-crit-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }

  .exclude-btn { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--red); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: all .15s; align-self: flex-end; }
  .exclude-btn:hover { background: rgba(248,113,113,0.18); }
</style>
</head>
<body>

<div id="gate" style="position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="background:#111118;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:320px;text-align:center">
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:#63CAB7;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px">EthicPrint Admin</div>
    <input id="pwd-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPwd()"
      style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;box-sizing:border-box;margin-bottom:12px">
    <button onclick="checkPwd()" style="width:100%;background:rgba(99,202,183,0.15);border:1px solid rgba(99,202,183,0.3);color:#63CAB7;padding:12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500">Enter</button>
    <div id="pwd-error" style="color:#f87171;font-size:12px;margin-top:10px;display:none">Wrong password</div>
  </div>
</div>

<script>
const API       = "https://web-production-14708.up.railway.app";
const ADMIN_KEY = "Vigiethic93!";
function checkPwd() {
  if (document.getElementById('pwd-input').value === ADMIN_KEY) {
    document.getElementById('gate').style.display = 'none';
    loadAll();
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', () => document.getElementById('pwd-input').focus());
</script>

<header>
  <h1>EthicPrint Admin</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending')">Pending <span class="badge badge-pending" id="badge-pending">–</span></button>
    <button class="tab" onclick="switchTab('approved')">Approved <span class="badge badge-count" id="badge-approved">–</span></button>
    <button class="tab" onclick="switchTab('rejected')">Rejected <span class="badge badge-count" id="badge-rejected">–</span></button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 4px"></div>
    <button class="tab" onclick="switchTab('scorev2')">📊 Score V2</button>
    <button class="tab" onclick="switchTab('costs')">💰 Costs</button>
    <button class="tab" onclick="switchTab('contributions')">📬 Contributions <span class="badge badge-pending" id="badge-contributions">–</span></button>
    <button class="tab" onclick="switchTab('issues')">🔗 Issues <span class="badge badge-pending" id="badge-issues">–</span></button>
  </div>
</header>

<div class="main">
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-val" style="color:var(--yellow)" id="s-pending">–</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--green)"  id="s-approved">–</div><div class="stat-label">Approved</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--red)"    id="s-rejected">–</div><div class="stat-label">Rejected</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent)" id="s-brands">–</div><div class="stat-label">Brands</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--orange)" id="s-total">–</div><div class="stat-label">Total</div></div>
  </div>
  <div class="filter-bar" id="filter-bar" style="display:none">
    <span>Category:</span>
    <button class="filter-chip active" onclick="filterCat('all')">All</button>
    <button class="filter-chip" onclick="filterCat('armi')">⚔️ Arms</button>
    <button class="filter-chip" onclick="filterCat('ambiente')">🌿 Environment</button>
    <button class="filter-chip" onclick="filterCat('diritti')">🤝 Rights</button>
    <button class="filter-chip" onclick="filterCat('fisco')">💰 Tax</button>
  </div>
  <div id="content"><div class="loading">Loading…</div></div>
</div>
<div class="toast hide" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════════
let currentTab = 'pending';
let currentCat = 'all';
let allProposals = { pending:[], approved:[], rejected:[] };
let counts = { pending:0, approved:0, rejected:0 };

const CAT_LABELS  = { armi:'Conflicts & Arms', ambiente:'Environment & CO₂', diritti:'Human Rights', fisco:'Tax & Transparency' };
const CAT_ICONS   = { armi:'⚔️', ambiente:'🌿', diritti:'🤝', fisco:'💰' };
const TIER_COLORS = { 1:'#f0c060', 2:'#a0b4c8', 3:'#c08060' };
const JUDGMENT_LABELS = {
  positive:      { en:'Positive evidence',      color:'#4ade80' },
  prev_positive: { en:'Predominantly positive', color:'#86efac' },
  prev_negative: { en:'Predominantly negative', color:'#fb923c' },
  negative:      { en:'Negative evidence',      color:'#ef4444' },
};
const TIER_VALUES = {
  1: { positive:20, prev_positive:10, prev_negative:-10, negative:-20 },
  2: { positive:10, prev_positive:5,  prev_negative:-5,  negative:-10 },
  3: { positive:2,  prev_positive:1,  prev_negative:-1,  negative:-2  },
};

// Score V2 state
let v2Brands      = [];
let v2Criteria    = {};
let v2Sources     = [];
let v2Scores      = {};
let v2BrandTotal  = null;
let v2CriteriaPub = 0;
let selectedBrand = null;
let activeCat     = 'armi';
let localExclusions  = new Set();
let localAssignments = new Map(); // criterionId → [{ source_id, tier, value, label_en }, ...]

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = error ? 'rgba(248,113,113,0.3)' : 'rgba(99,202,183,0.3)';
  t.classList.remove('hide');
  setTimeout(() => t.classList.add('hide'), 3000);
}
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function scoreColor(v) {
  if (v===null||v===undefined) return 'rgba(255,255,255,0.3)';
  return v>=0 ? '#63CAB7' : '#ef4444';
}
function totalColor(v) {
  if (v===null||v===undefined) return 'rgba(255,255,255,0.3)';
  if (v>=200)  return '#6dbb7a';
  if (v>=50)   return '#a8c5a0';
  if (v>=-49)  return '#facc15';
  if (v>=-199) return '#fb923c';
  return '#ef4444';
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
async function loadAll() {
  const [p,a,r] = await Promise.all([
    fetch(`${API}/source-proposals?status=pending`).then(r=>r.json()),
    fetch(`${API}/source-proposals?status=approved`).then(r=>r.json()),
    fetch(`${API}/source-proposals?status=rejected`).then(r=>r.json()),
  ]);
  allProposals = { pending:p.proposals, approved:a.proposals, rejected:r.proposals };
  counts = { pending:p.count, approved:a.count, rejected:r.count };
  document.getElementById('badge-pending').textContent  = counts.pending;
  document.getElementById('badge-approved').textContent = counts.approved;
  document.getElementById('badge-rejected').textContent = counts.rejected;
  document.getElementById('s-pending').textContent  = counts.pending;
  document.getElementById('s-approved').textContent = counts.approved;
  document.getElementById('s-rejected').textContent = counts.rejected;
  const brands = new Set(allProposals.pending.map(p=>p.brand_id));
  document.getElementById('s-brands').textContent = brands.size;
  document.getElementById('s-total').textContent  = counts.pending+counts.approved+counts.rejected;
  document.getElementById('stats').style.display  = 'grid';
  renderTab();
}

function switchTab(tab) {
  currentTab = tab; currentCat = 'all';
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['pending','approved','rejected','scorev2','costs','contributions','issues'][i]===tab);
  });
  document.getElementById('filter-bar').style.display = tab==='pending' ? 'flex' : 'none';
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.textContent.trim()==='All'));
  if (tab==='scorev2')       { loadScoreV2();      return; }
  if (tab==='costs')         { loadCosts();         return; }
  if (tab==='contributions') { loadContributions(); return; }
  if (tab==='issues')        { loadIssues();        return; }
  renderTab();
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('active',c.textContent.toLowerCase().includes(cat)||(cat==='all'&&c.textContent.trim()==='All'));
  });
  renderTab();
}

// ══════════════════════════════════════════════════
// PROPOSALS
// ══════════════════════════════════════════════════
function renderTab() {
  const proposals = allProposals[currentTab]||[];
  const filtered  = currentCat==='all' ? proposals : proposals.filter(p=>p.category_key===currentCat);
  if (!filtered.length) {
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="empty-icon">${currentTab==='pending'?'✅':'📭'}</div>No ${currentTab} proposals${currentCat!=='all'?' in this category':''}</div>`;
    return;
  }
  const groups={};
  filtered.forEach(p=>{
    const k=p.brand_id;
    if (!groups[k]) groups[k]={name:p.brands?.name||`Brand ${k}`,proposals:[]};
    groups[k].proposals.push(p);
  });
  let html='';
  Object.values(groups).forEach(g=>{
    html+=`<div class="brand-group"><div class="brand-header">
      <div class="brand-logo">${g.name[0]}</div>
      <div class="brand-name">${g.name}</div>
      <div class="brand-count">${g.proposals.length} proposal${g.proposals.length!==1?'s':''}</div>
    </div>`;
    g.proposals.forEach(p=>{ html+=renderProposalCard(p); });
    html+='</div>';
  });
  document.getElementById('content').innerHTML=html;
}

function renderProposalCard(p) {
  const cat=p.category_key;
  const jobClass=p.job_type==='replacement'?'job-replacement':'job-new';
  const jobLabel=p.job_type==='replacement'?'replacement':'new';
  let aiHtml='';
  if (p.ai_judgment) {
    const jColors={'Positive':'#4ade80','Predominantly positive':'#a8c5a0','Predominantly negative':'#fb923c','Negative':'#ef4444'};
    const jIcons ={'Positive':'🟢','Predominantly positive':'🟡','Predominantly negative':'🟠','Negative':'🔴'};
    const col=jColors[p.ai_judgment]||'#888';
    const icon=jIcons[p.ai_judgment]||'⚪';
    let tier=p.ai_tier||2;
    if (!p.ai_tier&&p.ai_value!=null){const av=Math.abs(p.ai_value);tier=av>=20?1:av>=10?2:3;}
    aiHtml=`<div class="ai-block"><div class="ai-block-header">
      <span class="ai-label">AI JUDGMENT</span>
      <span style="font-size:11px;color:${col};font-weight:600">${icon} ${p.ai_judgment}</span>
      <span class="ai-tier-badge tier-${tier}">T${tier}</span>
    </div>${p.ai_rationale?`<div style="font-size:11px;color:rgba(255,255,255,0.45);line-height:1.6">${p.ai_rationale}</div>`:''}</div>`;
  } else {
    aiHtml=`<div style="margin:8px 0 4px;font-size:11px;color:rgba(255,255,255,0.25);font-style:italic">No AI judgment</div>`;
  }
  let actions='';
  if (currentTab==='pending') {
    actions=`<div class="proposal-actions">
      <button class="btn btn-approve" onclick="approveProposal(${p.id})">✓ Approve</button>
      <button class="btn btn-reject"  onclick="rejectProposal(${p.id})">✗ Reject</button>
      <button class="btn btn-open"    onclick="window.open('${p.url}','_blank')">↗ Open</button>
    </div>`;
  } else {
    actions=`<div class="proposal-actions">
      <span class="status-chip ${p.status==='approved'?'status-approved':'status-rejected'}">${p.status==='approved'?'✓ Approved':'✗ Rejected'}</span>
      <button class="btn btn-revert" onclick="revertProposal(${p.id},this)" style="margin-top:6px">↩ Pending</button>
      <button class="btn btn-open"   onclick="window.open('${p.url}','_blank')" style="margin-top:4px">↗ Open</button>
    </div>`;
  }
  return `<div class="proposal-card ${p.status}" id="card-${p.id}">
    <span class="cat-badge cat-${cat}">${CAT_ICONS[cat]} ${CAT_LABELS[cat]}</span>
    <div class="proposal-body">
      <div class="proposal-title">${p.title||p.url}</div>
      <div class="proposal-pub">${p.publisher||'—'} <span class="job-badge ${jobClass}">${jobLabel}</span></div>
      ${p.summary?`<div class="proposal-summary">${p.summary}</div>`:''}
      ${aiHtml}
      <a class="proposal-url" href="${p.url}" target="_blank">${p.url}</a>
      <div class="proposal-meta">${fmtDate(p.created_at)}</div>
    </div>${actions}</div>`;
}

async function approveProposal(id) {
  const card=document.getElementById(`card-${id}`);
  card.querySelectorAll('button').forEach(b=>b.disabled=true);
  try {
    await fetch(`${API}/source-proposals/${id}/approve`,{method:'POST',headers:{'Content-Type':'application/json'}});
    card.classList.add('approved');
    card.querySelector('.proposal-actions').innerHTML=`<span class="status-chip status-approved">✓ Approved</span>`;
    counts.pending--;counts.approved++;
    document.getElementById('badge-pending').textContent =counts.pending;
    document.getElementById('badge-approved').textContent=counts.approved;
    document.getElementById('s-pending').textContent =counts.pending;
    document.getElementById('s-approved').textContent=counts.approved;
    allProposals.pending=allProposals.pending.filter(p=>p.id!==id);
    showToast('✓ Source approved');
  } catch(e){showToast('✗ Error',true);card.querySelectorAll('button').forEach(b=>b.disabled=false);}
}

async function rejectProposal(id) {
  const card=document.getElementById(`card-${id}`);
  card.querySelectorAll('button').forEach(b=>b.disabled=true);
  try {
    await fetch(`${API}/source-proposals/${id}/reject`,{method:'POST'});
    card.classList.add('rejected');
    card.querySelector('.proposal-actions').innerHTML=`<span class="status-chip status-rejected">✗ Rejected</span>`;
    counts.pending--;counts.rejected++;
    document.getElementById('badge-pending').textContent =counts.pending;
    document.getElementById('badge-rejected').textContent=counts.rejected;
    document.getElementById('s-pending').textContent =counts.pending;
    document.getElementById('s-rejected').textContent=counts.rejected;
    allProposals.pending=allProposals.pending.filter(p=>p.id!==id);
    showToast('Proposal rejected');
  } catch(e){showToast('✗ Error',true);card.querySelectorAll('button').forEach(b=>b.disabled=false);}
}

async function revertProposal(id,btn) {
  btn.disabled=true;btn.textContent='…';
  try {
    const res=await fetch(`${API}/source-proposals/${id}/revert`,{method:'PATCH'});
    if(!res.ok) throw new Error();
    const card=document.getElementById(`card-${id}`);
    card.style.opacity='0.3';card.style.pointerEvents='none';
    const wasApproved=currentTab==='approved';
    if(wasApproved){counts.approved--;document.getElementById('badge-approved').textContent=counts.approved;document.getElementById('s-approved').textContent=counts.approved;}
    else{counts.rejected--;document.getElementById('badge-rejected').textContent=counts.rejected;document.getElementById('s-rejected').textContent=counts.rejected;}
    counts.pending++;
    document.getElementById('badge-pending').textContent=counts.pending;
    document.getElementById('s-pending').textContent=counts.pending;
    showToast('↩ Reverted to pending');
    setTimeout(()=>loadAll(),800);
  } catch(e){showToast('✗ Error',true);btn.disabled=false;btn.textContent='↩ Pending';}
}

// ══════════════════════════════════════════════════
// SCORE V2
// ══════════════════════════════════════════════════
async function loadScoreV2() {
  document.getElementById('content').innerHTML=`<div class="loading">Loading Score V2…</div>`;
  try {
    const [brandsRes,criteriaRes]=await Promise.all([
      fetch(`${API}/brands?lang=en`).then(r=>r.json()),
      fetch(`${API}/scoring-criteria`).then(r=>r.json()),
    ]);
    v2Brands=brandsRes;
    v2Criteria={};
    if(criteriaRes.grouped){v2Criteria=criteriaRes.grouped;}
    else{
      const list=criteriaRes.criteria||Object.values(criteriaRes).flat();
      for(const c of list){if(!v2Criteria[c.category_key])v2Criteria[c.category_key]=[];v2Criteria[c.category_key].push(c);}
    }
    renderScoreV2Shell();
  } catch(e){document.getElementById('content').innerHTML=`<div style="color:#f87171;padding:20px">Failed: ${e}</div>`;}
}

function renderScoreV2Shell() {
  const sorted=[ ...v2Brands].sort((a,b)=>a.name.localeCompare(b.name));
  const options=sorted.map(b=>`<option value="${b.id}">${b.logo||''} ${b.name} · ${b.sector||''}</option>`).join('');
  document.getElementById('content').innerHTML=`
  <div class="v2-grid">
    <div class="v2-sidebar">
      <div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:8px">Brand</div>
      <select id="v2-brand-sel" onchange="onBrandSelect(this.value)"
        style="width:100%;background:#0f1a14;border:1px solid rgba(255,255,255,0.1);color:#f0f0f0;padding:10px 12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:14px;outline:none">
        <option value="">— Select brand —</option>${options}
      </select>
      <div id="v2-score-sidebar"><div style="font-size:11px;color:rgba(255,255,255,0.2);font-family:'DM Mono',monospace">Select a brand</div></div>
    </div>
    <div id="v2-main"><div style="font-size:11px;color:rgba(255,255,255,0.2);font-family:'DM Mono',monospace;padding:40px 0;text-align:center">Select a brand to start scoring</div></div>
  </div>`;
}

async function onBrandSelect(brandId) {
  if(!brandId) return;
  selectedBrand=v2Brands.find(b=>b.id==brandId);
  localExclusions=new Set();
  localAssignments=new Map();
  activeCat='armi';
  document.getElementById('v2-main').innerHTML=`<div class="loading">Loading…</div>`;
  document.getElementById('v2-score-sidebar').innerHTML=`<div style="font-size:11px;color:rgba(255,255,255,0.2)">Loading…</div>`;

  const [sourcesRes,scoresRes]=await Promise.all([
    fetch(`${API}/brands/${brandId}/sources`).then(r=>r.json()),
    fetch(`${API}/scoring/criterion-scores/${brandId}`).then(r=>r.json()).catch(()=>({criteria:[],total_score_v2:null,criteria_published:0})),
  ]);

  v2Sources=sourcesRes.sources||[];
  v2Sources.forEach(s=>{(s.excluded_from_criteria||[]).forEach(cid=>localExclusions.add(`${s.id}_${cid}`));});

  v2Scores={}; v2BrandTotal=scoresRes.total_score_v2; v2CriteriaPub=scoresRes.criteria_published||0;
  (scoresRes.criteria||[]).forEach(c=>{
    v2Scores[c.criterion_id]=c;
    if(c.sources?.length){
      const arr=c.sources.filter(s=>s.source_id).map(s=>({
        source_id:s.source_id, tier:s.tier, value:s.value, label_en:s.label_en,
      }));
      if(arr.length) localAssignments.set(c.criterion_id,arr);
      // marca le fonti gia' salvate come escluse dalla tendina di questo criterio
      arr.forEach(a=>localExclusions.add(`${a.source_id}_${c.criterion_id}`));
    }
  });

  renderScoreSidebar();
  renderV2Main();
}

function renderScoreSidebar() {
  const col=totalColor(v2BrandTotal);
  let html=`<div class="v2-score-panel">
    <div class="v2-total" style="color:${col}">${v2BrandTotal??'—'}</div>
    <div class="v2-total-label">${v2CriteriaPub} criteria published</div>
  </div>`;
  for(const cat of ['armi','ambiente','diritti','fisco']){
    const catCriteria=Object.entries(v2Scores).filter(([,c])=>c.criterion?.category_key===cat);
    if(!catCriteria.length) continue;
    html+=`<div style="margin-bottom:10px"><div style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${CAT_ICONS[cat]} ${CAT_LABELS[cat]}</div>`;
    catCriteria.forEach(([cid,c])=>{
      const s=c.computed_score; const col=scoreColor(s);
      html+=`<div class="sidebar-crit-row">
        <span style="color:rgba(255,255,255,0.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px" title="${c.criterion?.label_en||''}">${c.criterion?.label_en||cid}</span>
        <span style="font-family:'DM Mono',monospace;color:${col};flex-shrink:0;margin-left:6px">${c.criteria_met?(s>0?'+':'')+s:'—'}</span>
      </div>`;
    });
    html+='</div>';
  }
  document.getElementById('v2-score-sidebar').innerHTML=html;
}

function computeCatScore(cat) {
  let total=null;
  Object.entries(v2Scores).forEach(([,c])=>{
    if(c.criterion?.category_key===cat&&c.criteria_met&&c.computed_score!==null){
      total=(total||0)+c.computed_score;
    }
  });
  return total!==null?Math.round(total):null;
}

function renderV2Main() {
  const el=document.getElementById('v2-main');
  let tabsHtml=`<div class="v2-cat-tabs">`;
  for(const cat of ['armi','ambiente','diritti','fisco']){
    const cs=computeCatScore(cat);
    const csLabel=cs!==null?` (${cs>0?'+':''}${cs})`:'';
    tabsHtml+=`<button class="v2-cat-btn ${cat===activeCat?'active':''}" onclick="switchCat('${cat}')">${CAT_ICONS[cat]} ${cat}${csLabel}</button>`;
  }
  tabsHtml+=`</div>`;

  const catScore=computeCatScore(activeCat);
  const csColor=scoreColor(catScore);
  const csText=catScore!==null?`${catScore>0?'+':''}${catScore}`:'—';

  el.innerHTML=`
    <div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:14px">
      Score criteria — ${selectedBrand?.name}
    </div>
    ${tabsHtml}
    <div class="cat-score-header">
      <div class="cat-score-label">${CAT_ICONS[activeCat]} ${CAT_LABELS[activeCat]}</div>
      <div class="cat-score-val" style="color:${csColor};background:${csColor}18">${csText}</div>
    </div>
    <div id="v2-criteria-list"></div>`;
  renderCriteriaList();
}

function switchCat(cat){activeCat=cat;renderV2Main();}

function renderCriteriaList() {
  const criteria=v2Criteria[activeCat]||[];
  const el=document.getElementById('v2-criteria-list');
  if(!el) return;
  if(!criteria.length){el.innerHTML=`<div style="color:rgba(255,255,255,0.2);font-size:12px;padding:20px 0">No criteria for this category</div>`;return;}

  const catSources=v2Sources.filter(s=>!s.category_key||s.category_key===activeCat);

  let html='';
  criteria.forEach(crit=>{
    const critId=crit.id;
    const assignedList=localAssignments.get(critId)||[];

    // Fonti disponibili: solo quelle escluse per questo criterio specifico vengono rimosse.
    // Una fonte puo' essere usata su piu' criteri anche della stessa categoria.
    const available=catSources.filter(s=>{
      if(localExclusions.has(`${s.id}_${critId}`)) return false;
      return true;
    });

    html+=`<div class="criterion-card" id="crit-card-${critId}">
      <div class="criterion-title">${crit.label_en}</div>
      <div class="criterion-code">${crit.code}</div>`;

    assignedList.forEach(assigned=>{
      const src=v2Sources.find(s=>s.id===assigned.source_id);
      const val=assigned.value;
      const vc=scoreColor(val);
      html+=`<div class="assigned-source" style="margin-bottom:8px">
        <div class="assigned-info">
          <div class="assigned-title">${src?(src.title||src.url):`Source #${assigned.source_id}`}</div>
          <div class="assigned-meta">
            <span class="ai-tier-badge tier-${assigned.tier}">T${assigned.tier}</span>
            <span style="color:rgba(255,255,255,0.4)">${src?.publisher||'—'}</span>
            <span class="assigned-score" style="color:${vc}">${val>0?'+':''}${val}</span>
            <span style="color:rgba(255,255,255,0.3);font-size:10px">${assigned.label_en||''}</span>
          </div>
        </div>
        <button class="btn-unassign" onclick="unassignSource(${selectedBrand.id},${critId},${assigned.source_id})">\u21a9 Remove</button>
      </div>`;
    });
    if(assignedList.length) html+=`<div style="margin-bottom:14px"></div>`;

    // Il form appare sempre, anche se c'e' gia' un assegnamento (per aggiungerne altri o cambiarlo)
    html+=renderCriterionForm(critId,available);
    html+=`</div>`;
  });
  el.innerHTML=html;
}

function renderCriterionForm(critId,availableSources) {
  const srcOpts=availableSources.map(s=>
    `<option value="${s.id}" data-proposal="${s.proposal_id||''}">[T${s.tier||3}] ${s.publisher?s.publisher+' — ':''}${(s.title||s.url||'').substring(0,45)}</option>`
  ).join('');
  const jBtns=Object.entries(JUDGMENT_LABELS).map(([key,j])=>
    `<button class="judgment-btn" data-judgment="${key}" onclick="selectJudgment(${critId},'${key}',this)" style="color:${j.color}">${j.en.replace(' ','<br>')}</button>`
  ).join('');
  return `
    <div class="form-row">
      <div>
        <div class="form-label">Source</div>
        <select id="src-${critId}" class="v2-select">
          <option value="">— No source —</option>${srcOpts}
        </select>
      </div>
      <button class="exclude-btn" onclick="excludeSource(${critId})" title="Exclude: moves proposal to Rejected">✕ Exclude</button>
    </div>
    <div style="margin-bottom:10px">
      <div class="form-label">Tier</div>
      <select id="tier-${critId}" class="v2-select" onchange="updatePreview(${critId})">
        <option value="1">Tier 1 (±20/±10)</option>
        <option value="2" selected>Tier 2 (±10/±5)</option>
        <option value="3">Tier 3 (±2/±1)</option>
      </select>
    </div>
    <div style="margin-bottom:12px">
      <div class="form-label">Judgment</div>
      <div class="judgment-grid" id="jgrid-${critId}">${jBtns}</div>
    </div>
    <div class="save-row">
      <div class="value-preview" id="prev-${critId}">Select tier + judgment</div>
      <button id="save-${critId}" onclick="saveScore(${selectedBrand?.id},${critId})"
        style="background:rgba(99,202,183,0.1);border:1px solid rgba(99,202,183,0.25);color:#63CAB7;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;white-space:nowrap">
        Save score →
      </button>
    </div>`;
}

function selectJudgment(critId,judgment,btn) {
  document.querySelectorAll(`#jgrid-${critId} button`).forEach(b=>{
    b.style.background='transparent';b.style.borderColor='rgba(255,255,255,0.08)';b.style.fontWeight='400';delete b.dataset.selected;
  });
  const col=JUDGMENT_LABELS[judgment]?.color||'#fff';
  btn.style.background=`${col}22`;btn.style.borderColor=`${col}55`;btn.style.fontWeight='600';btn.dataset.selected='true';
  updatePreview(critId);
}

function updatePreview(critId) {
  const tierEl=document.getElementById(`tier-${critId}`);
  const jBtn=document.querySelector(`#jgrid-${critId} button[data-selected="true"]`);
  const prevEl=document.getElementById(`prev-${critId}`);
  if(!tierEl||!jBtn||!prevEl) return;
  const tier=parseInt(tierEl.value);
  const judgment=jBtn.dataset.judgment;
  const value=TIER_VALUES[tier][judgment];
  const col=scoreColor(value);
  prevEl.innerHTML=`Value: <span style="color:${col};font-size:16px;font-weight:700">${value>0?'+':''}${value}</span>`;
}

async function excludeSource(critId) {
  const srcEl=document.getElementById(`src-${critId}`);
  if(!srcEl?.value){showToast('Select a source first',true);return;}
  const sourceId=parseInt(srcEl.value);
  const opt=srcEl.options[srcEl.selectedIndex];
  const proposalId=parseInt(opt.dataset.proposal);
  if(!proposalId){showToast('No proposal linked to this source',true);return;}
  if(!confirm('Exclude this source? The proposal will be moved to Rejected.')) return;
  try {
    // revert to pending then reject
    await fetch(`${API}/source-proposals/${proposalId}/revert`,{method:'PATCH'});
    await fetch(`${API}/source-proposals/${proposalId}/reject`,{method:'POST'});
    // rimuovi dalle fonti locali
    v2Sources=v2Sources.filter(s=>s.id!==sourceId);
    localExclusions.add(`${sourceId}_${critId}`);
    counts.approved=Math.max(0,counts.approved-1);
    counts.rejected++;
    document.getElementById('badge-approved').textContent=counts.approved;
    document.getElementById('badge-rejected').textContent=counts.rejected;
    document.getElementById('s-approved').textContent=counts.approved;
    document.getElementById('s-rejected').textContent=counts.rejected;
    showToast('Source excluded and moved to Rejected');
    renderV2Main();
  } catch(e){showToast('Error excluding source',true);}
}

async function saveScore(brandId,critId) {
  const tierEl=document.getElementById(`tier-${critId}`);
  const jBtn=document.querySelector(`#jgrid-${critId} button[data-selected="true"]`);
  const srcEl=document.getElementById(`src-${critId}`);
  const saveBtn=document.getElementById(`save-${critId}`);
  if(!jBtn){showToast('Select a judgment first',true);return;}
  const tier=parseInt(tierEl.value);
  const judgment=jBtn.dataset.judgment;
  const sourceId=srcEl?.value?parseInt(srcEl.value):null;
  saveBtn.disabled=true;saveBtn.textContent='Saving…';
  try {
    const res=await fetch(`${API}/scoring/criterion-score`,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-key':ADMIN_KEY},
      body:JSON.stringify({brand_id:brandId,criterion_id:critId,source_id:sourceId,tier,judgment}),
    });
    if(!res.ok) throw new Error(await res.text());
    const data=await res.json();
    // Aggiorna stato locale
    const value=TIER_VALUES[tier][judgment];
    if(sourceId){
      const entry={source_id:sourceId,tier,value,label_en:JUDGMENT_LABELS[judgment]?.en||judgment};
      const existing=localAssignments.get(critId)||[];
      // evita duplicati per stessa fonte
      const filtered=existing.filter(e=>e.source_id!==sourceId);
      localAssignments.set(critId,[...filtered,entry]);
      // escludi questa fonte dalla tendina di questo criterio
      localExclusions.add(`${sourceId}_${critId}`);
    }
    // Ricarica scores
    const scoresRes=await fetch(`${API}/scoring/criterion-scores/${brandId}`).then(r=>r.json());
    v2Scores={};v2BrandTotal=scoresRes.total_score_v2;v2CriteriaPub=scoresRes.criteria_published||0;
    (scoresRes.criteria||[]).forEach(c=>{v2Scores[c.criterion_id]=c;});
    renderScoreSidebar();
    renderV2Main();
    showToast(`✓ Saved ${value>0?'+':''}${value} — Total: ${data.total_score_v2}`);
  } catch(e){
    showToast('Error: '+e.message,true);
    saveBtn.disabled=false;saveBtn.textContent='Save score →';
  }
}

async function unassignSource(brandId,critId,sourceId) {
  if(!confirm('Remove this score? The source will return to the dropdown.')) return;
  try {
    const res=await fetch(`${API}/scoring/criterion-score/${brandId}/${critId}/${sourceId}`,{
      method:'DELETE',headers:{'x-admin-key':ADMIN_KEY}
    });
    if(!res.ok) throw new Error();
    // Rimuovi solo questa fonte dall'array del criterio
    const remaining=(localAssignments.get(critId)||[]).filter(e=>e.source_id!==sourceId);
    if(remaining.length) localAssignments.set(critId,remaining);
    else localAssignments.delete(critId);
    // Rimetti la fonte disponibile nella tendina
    localExclusions.delete(`${sourceId}_${critId}`);
    const scoresRes=await fetch(`${API}/scoring/criterion-scores/${brandId}`).then(r=>r.json());
    v2Scores={};v2BrandTotal=scoresRes.total_score_v2;v2CriteriaPub=scoresRes.criteria_published||0;
    (scoresRes.criteria||[]).forEach(c=>{v2Scores[c.criterion_id]=c;});
    renderScoreSidebar();
    renderV2Main();
    showToast('✓ Score removed');
  } catch(e){showToast('Error removing score',true);}
}

// COSTS

function costCard(icon,title,main,sub,bar='',note=''){
  return `<div style="background:#111118;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:20px 24px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:18px">${icon}</span>
      <span style="font-size:12px;color:rgba(255,255,255,0.35);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase">${title}</span>
    </div>
    <div style="font-size:28px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;color:#e8e8f0">${main}</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:4px">${sub}</div>
    ${bar}${note?`<div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05)">${note}</div>`:''}
  </div>`;
}
function costBar(used,total){
  const pct=Math.min(100,Math.round((used/total)*100));
  const col=pct>=90?'#ef4444':pct>=70?'#fb923c':'#63CAB7';
  return `<div style="display:flex;align-items:center;gap:10px;margin-top:8px">
    <div style="flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${col};border-radius:2px"></div>
    </div>
    <span style="font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,0.3)">${pct}%</span>
  </div>`;
}
async function loadCosts(){
  const el=document.getElementById('content');
  el.innerHTML=`<div class="loading">Loading…</div>`;
  let brave=null;
  try{brave=await fetch(`${API}/costs/brave-count`).then(r=>r.json());}catch{}
  const bt=brave?.month_total||0;
  const mo=new Date().toLocaleString('en',{month:'long',year:'numeric'});
  el.innerHTML=`
  <div style="font-size:11px;color:rgba(255,255,255,0.2);font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">${mo}</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px">
    ${costCard('🤖','Anthropic','→ Console','Token usage','',`<a href="https://console.anthropic.com/settings/usage" target="_blank" style="color:#63CAB7;font-size:11px;text-decoration:none">console.anthropic.com ↗</a>`)}
    ${costCard('🔍','Brave Search',bt.toLocaleString(),`calls this month · limit 2,000`,costBar(bt,2000),`Finder: ${brave?.finder||0} · Checker: ${brave?.checker||0}`)}
    ${costCard('🚂','Railway','→ Dashboard','3 services','',`<a href="https://railway.app/dashboard" target="_blank" style="color:#63CAB7;font-size:11px;text-decoration:none">railway.app ↗</a>`)}
    ${costCard('🗄️','Supabase','→ Dashboard','DB · Auth · Storage','',`<a href="https://supabase.com/dashboard" target="_blank" style="color:#63CAB7;font-size:11px;text-decoration:none">supabase.com ↗</a>`)}
    ${costCard('📧','Resend','→ Dashboard','Email notifications','',`<a href="https://resend.com/emails" target="_blank" style="color:#63CAB7;font-size:11px;text-decoration:none">resend.com ↗</a>`)}
  </div>
  <div style="background:rgba(99,202,183,0.05);border:1px solid rgba(99,202,183,0.12);border-radius:12px;padding:16px 20px;font-size:12px;color:rgba(255,255,255,0.3);line-height:1.7">
    ℹ️ Solo Brave Search è tracciato internamente. Per gli altri apri i rispettivi dashboard.
  </div>`;
}

// ══════════════════════════════════════════════════
// CONTRIBUTIONS
// ══════════════════════════════════════════════════
async function loadContributions(){
  const el=document.getElementById('content');
  el.innerHTML=`<div class="loading">Loading…</div>`;
  try{
    const res=await fetch(`${API}/contribute/pending`,{headers:{'x-admin-key':ADMIN_KEY}});
    const data=await res.json();
    document.getElementById('badge-contributions').textContent=(data.counts.brand_proposals+data.counts.error_reports)||'0';
    renderContributions(data);
  }catch{document.getElementById('content').innerHTML=`<div style="color:#f87171;padding:20px">Failed to load</div>`;}
}
function renderContributions(data){
  const{brand_proposals,error_reports}=data;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
    <div style="font-size:11px;color:rgba(255,255,255,0.2);font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase">${brand_proposals.length} brand · ${error_reports.length} errors</div>
    <button onclick="loadContributions()" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px">↻ Refresh</button>
  </div>`;
  if(!brand_proposals.length&&!error_reports.length){
    html+=`<div class="empty"><div class="empty-icon">📬</div>No pending contributions</div>`;
    document.getElementById('content').innerHTML=html;return;
  }
  if(brand_proposals.length){
    html+=`<div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:12px">➕ Brand Proposals</div>`;
    brand_proposals.forEach(p=>{
      html+=`<div class="proposal-card" style="margin-bottom:8px"><div class="proposal-body">
        <div class="proposal-title">${p.name}</div>
        <div class="proposal-pub">${p.sector_key||'—'}${p.website?` · <a href="${p.website}" target="_blank" style="color:#63CAB7">${p.website}</a>`:''}</div>
        ${p.reason?`<div class="proposal-summary">${p.reason}</div>`:''}
        <div class="proposal-meta">${p.submitter||'Anonymous'} · ${new Date(p.created_at).toLocaleDateString()}</div>
      </div><div class="proposal-actions">
        <button class="btn btn-approve" onclick="resolveContrib('brand-proposal',${p.id},'approved',this)">✓ Approve</button>
        <button class="btn btn-reject"  onclick="resolveContrib('brand-proposal',${p.id},'rejected',this)">✗ Reject</button>
      </div></div>`;
    });
  }
  if(error_reports.length){
    html+=`<div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:12px;margin-top:24px">⚠️ Error Reports</div>`;
    error_reports.forEach(r=>{
      const bn=r.brands?.name||`Brand #${r.brand_id}`;
      html+=`<div class="proposal-card" style="margin-bottom:8px"><div class="proposal-body">
        <div class="proposal-title">${bn}${r.category_key?` · <span class="cat-badge cat-${r.category_key}">${r.category_key}</span>`:''}</div>
        <div class="proposal-summary" style="margin-top:6px">${r.description}</div>
        ${r.source_url?`<a href="${r.source_url}" target="_blank" class="proposal-url">${r.source_url}</a>`:''}
        <div class="proposal-meta">${r.submitter||'Anonymous'} · ${new Date(r.created_at).toLocaleDateString()}</div>
      </div><div class="proposal-actions">
        <button class="btn btn-approve" onclick="resolveContrib('error-report',${r.id},'resolved',this)">✓ Resolved</button>
        <button class="btn btn-reject"  onclick="resolveContrib('error-report',${r.id},'rejected',this)">✗ Ignore</button>
      </div></div>`;
    });
  }
  document.getElementById('content').innerHTML=html;
}
async function resolveContrib(type,id,status,btn){
  btn.disabled=true;btn.textContent='…';
  try{
    const res=await fetch(`${API}/contribute/${type}/${id}/resolve?status=${status}`,{method:'POST',headers:{'x-admin-key':ADMIN_KEY}});
    if(!res.ok) throw new Error();
    btn.closest('.proposal-card').style.opacity='0.3';
    showToast(status==='resolved'||status==='approved'?'✓ Done':'✗ Ignored');
    setTimeout(()=>loadContributions(),800);
  }catch{btn.disabled=false;btn.textContent=status==='resolved'||status==='approved'?'✓':'✗';showToast('Error',true);}
}

// ══════════════════════════════════════════════════
// ISSUES
// ══════════════════════════════════════════════════
async function loadIssues(){
  const el=document.getElementById('content');
  el.innerHTML=`<div class="loading">Loading issues…</div>`;
  try{
    const res=await fetch(`${API}/sources/issues`,{headers:{'x-admin-key':ADMIN_KEY}});
    const data=await res.json();
    document.getElementById('badge-issues').textContent=data.count||'0';
    renderIssues(data.issues||[]);
  }catch{document.getElementById('content').innerHTML=`<div style="color:#f87171;padding:20px">Failed</div>`;}
}
function renderIssues(issues){
  const el=document.getElementById('content');
  if(!issues.length){el.innerHTML=`<div class="empty"><div class="empty-icon">✅</div>No broken or missing sources</div>`;return;}
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
    <div style="font-size:11px;color:rgba(255,255,255,0.2);font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase">${issues.length} source issues</div>
    <button onclick="loadIssues()" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px">↻ Refresh</button>
  </div>`;
  issues.forEach(s=>{
    const bg=s.broken?'rgba(239,68,68,0.12)':'rgba(250,204,21,0.1)';
    const br=s.broken?'rgba(239,68,68,0.2)':'rgba(250,204,21,0.2)';
    html+=`<div id="issue-${s.id}" style="background:${bg};border:1px solid ${br};border-radius:12px;padding:16px;margin-bottom:10px">
      <div style="display:flex;align-items:flex-start;gap:14px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:11px;color:rgba(255,255,255,0.3)">${s.broken?'🔴 Broken':'🟡 Missing'}</span>
            ${s.category_key?`<span class="cat-badge cat-${s.category_key}">${CAT_ICONS[s.category_key]||''} ${s.category_key}</span>`:''}
          </div>
          <div style="font-size:13px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.title||'Untitled'}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:6px">${s.publisher||'—'} · Brand #${s.brand_id}</div>
          <a href="${s.url}" target="_blank" style="font-size:11px;font-family:'DM Mono',monospace;color:rgba(99,202,183,0.4);display:block;max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.url}</a>
          <div style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px">Last checked: ${s.last_checked?new Date(s.last_checked).toLocaleDateString():'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <button class="btn" style="background:rgba(99,202,183,0.1);border-color:rgba(99,202,183,0.25);color:#63CAB7;font-size:11px" onclick="findReplacement(${s.id},this)">🔍 Find replacement</button>
          <button class="btn btn-reject" style="font-size:11px" onclick="markResolved(${s.id},this)">✓ Mark resolved</button>
        </div>
      </div>
      <div id="candidates-${s.id}" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)"></div>
    </div>`;
  });
  el.innerHTML=html;
}
async function findReplacement(sourceId,btn){
  btn.disabled=true;const orig=btn.textContent;btn.textContent='⏳ Searching…';
  const candEl=document.getElementById(`candidates-${sourceId}`);
  candEl.style.display='block';
  candEl.innerHTML=`<div style="font-size:11px;color:rgba(255,255,255,0.2);font-family:'DM Mono',monospace">Searching…</div>`;
  try{
    const data=await fetch(`${API}/sources/${sourceId}/find-replacement`,{method:'POST',headers:{'x-admin-key':ADMIN_KEY}}).then(r=>r.json());
    renderCandidates(sourceId,data);
  }catch{candEl.innerHTML=`<div style="color:#f87171;font-size:12px">Search failed.</div>`;}
  finally{btn.disabled=false;btn.textContent=orig;}
}
function renderCandidates(sourceId,data){
  const el=document.getElementById(`candidates-${sourceId}`);
  if(!data.candidates?.length){el.innerHTML=`<div style="font-size:12px;color:rgba(255,255,255,0.2)">No candidates for: <em>${data.query}</em></div>`;return;}
  let html=`<div style="font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px">${data.candidates.length} candidates</div>`;
  data.candidates.forEach(c=>{
    const tc=TIER_COLORS[c.tier]||TIER_COLORS[3];
    html+=`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:${tc};border:1px solid ${tc}44;border-radius:4px;padding:1px 6px">T${c.tier}</span>
          <span style="font-size:12px;font-weight:500">${c.publisher||'—'}</span>
        </div>
        <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:4px">${c.title||'No title'}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:6px;line-height:1.5">${c.summary||''}</div>
        <a href="${c.url}" target="_blank" style="font-size:10px;font-family:'DM Mono',monospace;color:rgba(99,202,183,0.4);display:block;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.url}</a>
      </div>
      <button class="btn btn-approve" style="font-size:11px;flex-shrink:0"
        onclick="proposeReplacement(${sourceId},'${c.url.replace(/'/g,"\\'")}','${(c.title||'').replace(/'/g,"\\'")}','${(c.publisher||'').replace(/'/g,"\\'")}','${(c.summary||'').replace(/'/g,"\\'")}',this)">
        ✓ Propose
      </button>
    </div>`;
  });
  el.innerHTML=html;
}
async function proposeReplacement(sourceId,url,title,publisher,summary,btn){
  btn.disabled=true;btn.textContent='…';
  try{
    const res=await fetch(`${API}/sources/${sourceId}/propose-replacement`,{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':ADMIN_KEY},body:JSON.stringify({url,title,publisher,summary})});
    if(!res.ok) throw new Error();
    btn.textContent='✅ Proposed';btn.style.color='#4ade80';
    showToast('✓ Proposed — check Pending tab');
  }catch{btn.disabled=false;btn.textContent='✓ Propose';showToast('Error',true);}
}
async function markResolved(sourceId,btn){
  btn.disabled=true;btn.textContent='…';
  try{
    await fetch(`${API}/sources/${sourceId}/mark-resolved`,{method:'POST',headers:{'x-admin-key':ADMIN_KEY}});
    document.getElementById(`issue-${sourceId}`).style.opacity='0.3';
    showToast('✓ Resolved');
  }catch{btn.disabled=false;btn.textContent='✓ Mark resolved';showToast('Error',true);}
}
</script>
